name: thesis
channels:
  - conda-forge
dependencies:
  - python=3.11
  # Pin ONE consistent BLAS/LAPACK (OpenBLAS) for numpy/scipy/scikit-learn. Mixing a
  # conda numpy (MKL) with a pip-installed scipy (bundled OpenBLAS) puts two LAPACKs in
  # one process and crashes np.linalg.svd (fatal 0xc06d007f on Windows). It only surfaces
  # at the PCA/SVD step, which the full 266-col build reaches. Keeping libblas on openblas
  # and numpy/scipy/scikit-learn ALL from conda-forge (never pip) keeps a single LAPACK.
  - libblas=*=*openblas
  - numpy
  - pandas
  - scipy            # from conda-forge ONLY — do not let pip install scipy (BLAS clash)
  - scikit-learn
  - statsmodels
  - matplotlib
  - jupyter
  - pip
  - pip:
      - nbstripout
      # CatBoost notebook (model_catboost_v5_clean): pinned to the tested version.
      # Native SHAP (ShapValues) needs no separate shap lib. pip is fine — CatBoost
      # bundles its own libs and does not perturb the numpy/scipy/sklearn BLAS.
      - catboost==1.2.10
      # HTBoost notebooks only: requires a working Julia + HybridTreeBoosting install.
      # - juliacall
# After `conda env create -f environment.yml && conda activate thesis`, run
# `pip install -e .` to install the `src` package in editable mode.
